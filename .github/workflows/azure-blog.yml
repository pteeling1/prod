name: Azure Local Blog Generator

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post
        run: node scripts/generate-blog.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_MODE: 'true'

      - name: Commit and push
        run: |
          if git diff --quiet blogs-data.json; then
            echo "✅ No changes to blogs-data.json"
            exit 0
          fi
          
          git config user.name "Blog Bot"
          git config user.email "bot@example.com"
          git add blogs-data.json
          git commit -m "Auto-generated blog post from Azure Local documentation"
          git push origin main
