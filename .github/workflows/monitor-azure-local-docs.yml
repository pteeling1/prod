name: Generate Blog from Azure Docs Changes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Azure Local doc changes
        id: fetch-commits
        run: |
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=100")
          
          # Filter for Azure Local documentation changes (azure-local or azure/local paths)
          FILTERED=$(echo "$RESPONSE" | jq -c '[.[] | select(.commit.message | contains("azure-local") or contains("Azure Local") or contains("azure/local"))]')
          
          # If no direct mentions, look for the files
          if [ "$(echo "$FILTERED" | jq 'length')" == "0" ]; then
            FILTERED=$(echo "$RESPONSE" | jq -c '[.[] | select(.commit.message | test("(deploy|upgrade|update|security|config)", "i"))]' | head -1)
          fi
          
          echo "commits=$(echo "$FILTERED" | jq -c '.' )" >> $GITHUB_OUTPUT
      
      - name: Generate blog with Claude
        id: generate-blog
        run: |
          cat > /tmp/gen-blog.js << 'SCRIPT'
          const https = require('https');
          
          async function callClaudeAPI(prompt) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({
                model: "claude-3.5-sonnet",
                messages: [{
                  role: "user",
                  content: prompt
                }],
                max_tokens: 1024
              });
              
              const options = {
                hostname: 'api.github.com',
                path: '/models/chat/completions',
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
                  'Content-Type': 'application/json',
                  'Content-Length': data.length,
                  'User-Agent': 'AzureLocalBlogGenerator'
                },
                timeout: 30000
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                let chunks = 0;
                
                res.on('data', chunk => {
                  chunks++;
                  body += chunk;
                });
                
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(body);
                    
                    if (res.statusCode !== 200) {
                      reject(new Error('API error ' + res.statusCode + ': ' + (parsed.message || 'Unknown error')));
                      return;
                    }
                    
                    if (parsed.choices && parsed.choices[0] && parsed.choices[0].message) {
                      resolve(parsed.choices[0].message.content);
                    } else {
                      reject(new Error('No choices in response'));
                    }
                  } catch (e) {
                    reject(new Error('Parse error: ' + e.message));
                  }
                });
              });
              
              req.on('error', reject);
              req.on('timeout', () => {
                req.destroy();
                reject(new Error('API request timeout'));
              });
              
              req.write(data);
              req.end();
            });
          }
          
          async function generateBlog() {
            const commits = JSON.parse(process.env.COMMITS_DATA);
            
            if (!commits || commits.length === 0) {
              process.exit(0);
            }
            
            const commit = commits[0];
            const title = 'Azure Local Documentation Update — ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
            const message = commit.commit?.message || 'Updated documentation';
            const firstLine = message.split('\n')[0];
            
            try {
              const prompt = "You are a technical blog writer specializing in Azure infrastructure. Write a concise technical blog post (80-120 words) for operations teams.\n\nChange: " + firstLine + "\n\nRequirements:\n- Lead with the specific change or improvement\n- Explain operational impact (why teams should care)\n- Include 1-2 actionable next steps for operators\n- Use clear, direct language for cloud ops professionals\n- End with a link reference to view details on GitHub\n\nFormat: Use short paragraphs separated by line breaks.";
              
              const claudeContent = await callClaudeAPI(prompt);
              const formattedContent = claudeContent.split('\n').filter(line => line.trim()).map(line => '<p class="article-text">' + line.trim() + '</p>').join('');
              const content = formattedContent + '<p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/' + commit.sha.slice(0, 7) + '" target="_blank">View on GitHub →</a></p>';
              
              const blogPost = {
                id: 'auto-' + new Date().toISOString().split('T')[0] + '-' + Math.random().toString(36).substr(2, 9),
                title: title,
                subtitle: 'Azure Local documentation improvements',
                date: new Date().toISOString().split('T')[0],
                content: content,
                source: 'Azure Local Docs Monitor',
                auto_generated: true,
                claude_generated: true
              };
              
              console.log(JSON.stringify(blogPost));
            } catch (error) {
              // Fallback: generate basic blog from commit
              const content = '<p class="article-text"><strong>' + firstLine + '</strong></p><p class="article-text">Azure Local documentation has been updated. Review the latest changes to ensure your infrastructure deployments remain current and secure.</p><p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/' + commit.sha.slice(0, 7) + '" target="_blank">View on GitHub →</a></p>';
              
              const blogPost = {
                id: 'auto-' + new Date().toISOString().split('T')[0] + '-' + Math.random().toString(36).substr(2, 9),
                title: title,
                subtitle: 'Azure Local documentation improvements',
                date: new Date().toISOString().split('T')[0],
                content: content,
                source: 'Azure Local Docs Monitor',
                auto_generated: true
              };
              
              console.log(JSON.stringify(blogPost));
            }
          }
          
          generateBlog().catch(e => {
            console.log(JSON.stringify({
              id: 'auto-' + new Date().toISOString().split('T')[0] + '-fallback',
              title: 'Azure Local Documentation Update',
              subtitle: 'Azure Local documentation improvements',
              date: new Date().toISOString().split('T')[0],
              content: '<p class="article-text">Documentation has been updated. Check the repository for details.</p>',
              source: 'Azure Local Docs Monitor',
              auto_generated: true
            }));
          });
          SCRIPT
          
          node /tmp/gen-blog.js > /tmp/blog-post.json 2>&1
          BLOG_JSON=$(cat /tmp/blog-post.json)
          echo "blog_post=$BLOG_JSON" >> $GITHUB_OUTPUT
        env:
          COMMITS_DATA: ${{ steps.fetch-commits.outputs.commits }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update blogs-data.json
        run: |
          BLOG_JSON='${{ steps.generate-blog.outputs.blog_post }}'
          
          # Check if blog post is valid JSON
          if ! echo "$BLOG_JSON" | jq empty 2>/dev/null; then
            echo "Invalid blog JSON, skipping"
            exit 0
          fi
          
          # Update blogs-data.json
          jq ".auto_posts |= [$(echo "$BLOG_JSON")] + ." blogs-data.json > blogs-data.json.tmp
          mv blogs-data.json.tmp blogs-data.json
          
          # Commit if changed
          if git diff --quiet blogs-data.json; then
            echo "No changes to blog data"
          else
            git config user.email "bot@example.com"
            git config user.name "Blog Bot"
            git add blogs-data.json
            git commit -m "Auto-generated blog post"
            git push origin main
          fi
