name: Monitor Azure Local Docs & Generate Blog Post

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest commits to Azure Local docs
        id: get-commits
        run: |
          set +e  # Disable exit-on-error for this step
          
          # Use GitHub API to monitor MicrosoftDocs/azure-stack-docs (the correct public repository)
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Querying MicrosoftDocs/azure-stack-docs since: $SINCE_DATE"
          
          # Query commits to the main branch
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=20")
          
          # Extract HTTP status code and body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Body length: $(echo "$BODY" | wc -c) bytes"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "API request failed with status $HTTP_CODE"
            echo "Response: $BODY"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Try to validate JSON first
          if ! echo "$BODY" | jq empty 2>/dev/null; then
            echo "Response is not valid JSON"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for error message in response
          ERROR_MSG=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null)
          if [ ! -z "$ERROR_MSG" ]; then
            echo "API Error: $ERROR_MSG"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if response is a valid array
          IS_ARRAY=$(echo "$BODY" | jq 'type' 2>/dev/null)
          echo "Response type: $IS_ARRAY"
          
          if [ "$IS_ARRAY" != '"array"' ]; then
            echo "API response is not an array (type: $IS_ARRAY)"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Count commits
          COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null)
          echo "Found $COUNT recent commits"
          
          if [ "$COUNT" -eq 0 ] || [ -z "$COUNT" ]; then
            echo "No recent changes found"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Extract commits
            COMMITS=$(echo "$BODY" | jq -r '.[] | "\(.sha[0:7])|\(.commit.message // "")|\(.commit.author.date // "")"' 2>/dev/null | head -5)
            
            if [ ! -z "$COMMITS" ]; then
              echo "Successfully extracted $COUNT commits"
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "commits<<EOF" >> $GITHUB_OUTPUT
              echo "$COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "No commits could be extracted"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          exit 0

      - name: Fetch changed files and diffs
        if: steps.get-commits.outputs.has_changes == 'true'
        id: changed-files
        run: |
          set +e  # Disable exit-on-error
          
          # Get list of commits
          COMMITS_DATA='${{ steps.get-commits.outputs.commits }}'
          
          # Extract the first 2 SHAs so we can compare them and get diffs
          SHAS=$(echo "$COMMITS_DATA" | cut -d'|' -f1 | head -2)
          SHA_ARRAY=($SHAS)
          
          LATEST_SHA=${SHA_ARRAY[0]}
          PREV_SHA=${SHA_ARRAY[1]:-$LATEST_SHA}  # If only one commit, use it as base
          
          echo "═══════════════════════════════════════════════════════"
          echo "📊 FETCHING DIFFS AND FILE CHANGES"
          echo "═══════════════════════════════════════════════════════"
          echo "Latest commit: $LATEST_SHA"
          echo "Previous commit: $PREV_SHA"
          echo ""
          
          # Use GitHub API to get the diff between commits
          TEMP_DIFFS=$(mktemp)
          echo "--- File Diffs and Changes ---" >> "$TEMP_DIFFS"
          
          # Get detailed commit info with file changes
          COMMIT_DETAIL=$(curl -s "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits/$LATEST_SHA" \
            -H "Accept: application/vnd.github.v3+json")
          
          # Extract files with their stats and patches - FILTER FOR AZURE-LOCAL ONLY
          FILE_CHANGES=$(echo "$COMMIT_DETAIL" | jq -r '.files[]? | select(.filename | startswith("azure-local/")) | select(.status != "deleted") | 
            "FILE:\(.filename)\nSTATUS:\(.status)\nADDITIONS:\(.additions)\nDELETIONS:\(.deletions)\nPATCH_START\n\(.patch // "")\nPATCH_END\n---"' 2>/dev/null)
          
          # Store file changes for Node.js to parse
          echo "$FILE_CHANGES" >> "$TEMP_DIFFS"
          
          # Also get the full commit message and metadata
          echo "" >> "$TEMP_DIFFS"
          echo "COMMIT_MESSAGE:" >> "$TEMP_DIFFS"
          echo "$COMMIT_DETAIL" | jq -r '.commit.message' >> "$TEMP_DIFFS"
          
          # Store GitHub URLs for files - FILTER FOR AZURE-LOCAL ONLY
          FILES_JSON=$(echo "$COMMIT_DETAIL" | jq -r '.files[]? | select(.filename | startswith("azure-local/")) | select(.status != "deleted") | 
            {filename: .filename, url: "https://github.com/MicrosoftDocs/azure-stack-docs/blob/'$LATEST_SHA'/\(.filename)", additions: .additions, deletions: .deletions}' 2>/dev/null)
          
          echo "$FILES_JSON" >> "$TEMP_DIFFS"
          
          # Save to persistent location
          DIFFS_FILE="${RUNNER_TEMP}/diffs.txt"
          cp "$TEMP_DIFFS" "$DIFFS_FILE"
          
          echo "📁 Files changed in commit (Azure Local only):"
          echo "$COMMIT_DETAIL" | jq -r '.files[]? | select(.filename | startswith("azure-local/")) | select(.status != "deleted") | 
            "  • \(.filename) (\(.status): +\(.additions) -\(.deletions))"' 2>/dev/null
          echo ""
          
          echo "diffs_path=$DIFFS_FILE" >> $GITHUB_OUTPUT
          rm -f "$TEMP_DIFFS"
          
          echo "Diff fetch complete"
          exit 0

      - name: Generate blog post with diffs
        if: steps.get-commits.outputs.has_changes == 'true'
        id: generate-post
        run: |
          set +e
          
          # Write commits and diffs to files to avoid bash parsing issues
          COMMITS_FILE="${RUNNER_TEMP}/commits.txt"
          DIFFS_PATH='${{ steps.changed-files.outputs.diffs_path }}'
          
          echo '${{ steps.get-commits.outputs.commits }}' > "$COMMITS_FILE"
          
          # Debug output
          echo "DEBUG: Commits file: $COMMITS_FILE"
          echo "DEBUG: Commits file exists: $([ -f "$COMMITS_FILE" ] && echo 'yes' || echo 'no')"
          echo "DEBUG: Diffs path: $DIFFS_PATH"
          echo "DEBUG: Diffs exists: $([ -f "$DIFFS_PATH" ] && echo 'yes' || echo 'no')"
          
          # Use Node.js to generate blog post from diffs
          # Save to temp file so next step can read it
          TEMP_POST="${RUNNER_TEMP}/blog-post-temp.json"
          
          # Export variables so Node subshell can access them
          export COMMITS_FILE DIFFS_PATH TEMP_POST
          
          node << 'NODEJS_EOF'
          const fs = require('fs');
          
          try {
            // Read commits and diffs from files
            const commitsFile = process.env.COMMITS_FILE;
            const diffsFile = process.env.DIFFS_PATH;
            
            let commits = '';
            let diffs = '';
            
            if (fs.existsSync(commitsFile)) {
              commits = fs.readFileSync(commitsFile, 'utf8');
              console.log(`✓ Read commits from file: ${commits.length} chars`);
            } else {
              console.log(`⚠️ Commits file not found: ${commitsFile}`);
            }
            
            if (fs.existsSync(diffsFile)) {
              diffs = fs.readFileSync(diffsFile, 'utf8');
              console.log(`✓ Read diffs from file: ${diffs.length} chars`);
            } else {
              console.log(`⚠️ Diffs file not found: ${diffsFile}`);
            }
            
            // Parse commits
            const commitLines = commits.split('\n').filter(line => line.trim());
            const commitMessages = commitLines.map(line => {
              const parts = line.split('|');
              return {
                sha: (parts[0] || '').trim(),
                message: (parts[1] || '').trim(),
                date: (parts[2] || '').trim()
              };
            }).filter(c => c.message);
            
            if (commitMessages.length === 0) {
              console.log('No commits to process');
              process.exit(0);
            }
            
            console.log('═══════════════════════════════════════════════════════');
            console.log('📝 PARSING DIFFS AND CHANGES');
            console.log('═══════════════════════════════════════════════════════');
            
            // Parse diffs to extract files and changes
            const diffLines = diffs.split('\n');
            let files = [];
            let currentFile = null;
            let fileAdditions = 0;
            let fileDeletions = 0;
            let keyTopics = [];
            let fileLinks = [];
            
            for (let i = 0; i < diffLines.length; i++) {
              const line = diffLines[i];
              
              // Parse file information
              if (line.startsWith('FILE:')) {
                if (currentFile) {
                  files.push({
                    ...currentFile,
                    additions: fileAdditions,
                    deletions: fileDeletions
                  });
                }
                currentFile = { name: line.replace('FILE:', '').trim() };
                fileAdditions = 0;
                fileDeletions = 0;
              }
              
              if (line.startsWith('STATUS:')) {
                if (currentFile) currentFile.status = line.replace('STATUS:', '').trim();
              }
              
              if (line.startsWith('ADDITIONS:')) {
                fileAdditions = parseInt(line.replace('ADDITIONS:', '').trim()) || 0;
              }
              
              if (line.startsWith('DELETIONS:')) {
                fileDeletions = parseInt(line.replace('DELETIONS:', '').trim()) || 0;
              }
              
              // Extract topics from patch headers (lines starting with +##, +title:)
              if (line.startsWith('+##')) {
                const topic = line.replace('+##', '').trim();
                if (topic.length > 3 && topic.length < 80) {
                  keyTopics.push(topic);
                }
              }
              if (line.match(/^\+title:\s/)) {
                const title = line.replace(/^\+title:\s/, '').trim();
                if (title.length > 5 && title.length < 100) {
                  keyTopics.push(title);
                }
              }
            }
            
            // Add final file
            if (currentFile) {
              files.push({
                ...currentFile,
                additions: fileAdditions,
                deletions: fileDeletions
              });
            }
            
            // Filter to only Azure Local files (remove operator-nexus and other unrelated paths)
            files = files.filter(f => f.name && f.name.startsWith('azure-local/'));
            
            // If no Azure Local files changed, skip blog post generation
            if (files.length === 0) {
              console.log('⚠️ No Azure Local files found in commit (commit may affect other products like Operator Nexus). Skipping blog post.');
              process.exit(0);
            }
            
            let jsonMatch = diffs.match(/\{"filename".*?\}\s*$/ms);
            if (jsonMatch) {
              try {
                const jsonStr = jsonMatch[0];
                const linkObj = JSON.parse(jsonStr);
                if (linkObj.filename && linkObj.url) {
                  fileLinks.push(linkObj);
                }
              } catch (e) {
                // Continue if JSON parsing fails
              }
            }
            
            // Extract actual changes from patches - REAL CHANGES, not generic summaries
            function extractActualChanges(patches) {
              const changes = [];
              const patchLines = patches.split('\n');
              
              for (let i = 0; i < patchLines.length; i++) {
                const line = patchLines[i];
                
                // Look for added lines that contain requirements or important changes
                if (line.startsWith('+') && !line.startsWith('+++')) {
                  const content = line.substring(1).trim();
                  
                  // Skip empty lines and markdown formatting
                  if (content.length < 5 || content.match(/^[#\-*]+$/)) continue;
                  
                  // Capture meaningful additions
                  if (content.match(/require|must|should|need|account|rights|permission|group|role|batch|administrator|credential|login|log\s+on/i)) {
                    changes.push(content);
                  }
                }
                
                // Also capture removed lines to show what was replaced
                if (line.startsWith('-') && !line.startsWith('---')) {
                  const content = line.substring(1).trim();
                  if (content.length < 5 || content.match(/^[#\-*]+$/)) continue;
                  if (content.match(/require|must|should|need|account|rights|permission|group|role|batch|administrator/i)) {
                    changes.push(`(removed) ${content}`);
                  }
                }
              }
              
              // Remove duplicates and limit to most relevant
              const uniqueChanges = [...new Set(changes)].filter(c => c && c.length > 3);
              
              return uniqueChanges.slice(0, 5);
            }
            
            // Collect all patches to analyze
            const allPatches = diffs.split('PATCH_START').slice(1).map(p => p.split('PATCH_END')[0]).join('\n');
            const actualChanges = extractActualChanges(allPatches);
            
            // Remove duplicates from topics
            keyTopics = [...new Set(keyTopics)].filter(t => t && t.length > 2).slice(0, 5);
            
            // Generate blog post with SPECIFIC actual changes
            const latestSha = commitMessages[0].sha;
            const subtitle = keyTopics.length > 0 
              ? keyTopics.slice(0, 2).join(' • ')
              : 'Azure Local documentation improvements';
            
            // Build file links HTML with Learn URLs instead of GitHub
            const fileLinksHtml = files
              .slice(0, 5)
              .map(f => {
                const filePath = f.name.replace(/\.md$/, '');
                const displayName = filePath.split('/').pop().replace(/-/g, ' ');
                const learnUrl = `https://learn.microsoft.com/en-us/azure/${filePath}`;
                return `<li><a href="${learnUrl}" target="_blank">${displayName}</a> <span style="color: #6b7280; font-size: 13px;">(${f.status})</span></li>`;
              })
              .join('\n');
            
            // Build Microsoft Learn URL from the first modified file
            let learnUrl = 'https://learn.microsoft.com/en-us/azure/azure-local/';
            if (files.length > 0) {
              const firstFile = files[0];
              // Convert file path to Learn URL structure
              // e.g., azure-local/upgrade/install-solution.md -> /azure/azure-local/upgrade/install-solution
              const filePath = firstFile.name.replace(/\.md$/, '');
              learnUrl = `https://learn.microsoft.com/en-us/azure/${filePath}`;
            }
            
            const blogPost = {
              title: 'Azure Local Documentation Update — ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' }),
              subtitle: subtitle,
              content: `
              <p class="article-text"><strong>What changed:</strong></p>
              ${actualChanges.length > 0 ? `
              <ul style="margin-left: 20px; font-size: 14px; line-height: 1.8;">
              ${actualChanges.map(change => `<li>${change}</li>`).join('\n')}
              </ul>
              ` : '<p class="article-text">Documentation was updated. Check the Learn pages for details.</p>'}
              
              <p class="article-text"><strong>📚 Updated pages:</strong></p>
              <ul style="margin-left: 20px; font-size: 14px;">
              ${fileLinksHtml}
              </ul>
              
              <p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/${latestSha}" target="_blank">View detailed diff on GitHub →</a></p>
              `.trim()
            };
            
            // Write JSON to temp file so next step can read it
            const jsonOutput = JSON.stringify(blogPost);
            const tempPostFile = process.env.TEMP_POST || '/tmp/blog-post-temp.json';
            fs.writeFileSync(tempPostFile, jsonOutput);
            console.log(`Wrote blog post to: ${tempPostFile}`);
            
            // Also log it for visibility
            console.log('═══════════════════════════════════════════════════════');
            console.log('✅ BLOG POST GENERATED WITH DIFFS');
            console.log('═══════════════════════════════════════════════════════');
            console.log(jsonOutput);
            console.log('');
            
          } catch (error) {
            console.error('Error generating blog post:', error);
            process.exit(1);
          }
          NODEJS_EOF
          
          # Output the post for next step via environment
          if [ -f "$TEMP_POST" ]; then
            echo "✅ Successfully generated blog post at $TEMP_POST"
            echo "post_json_path=$TEMP_POST" >> $GITHUB_OUTPUT
            echo "📤 Set post_json_path output"
          else
            echo "❌ TEMP_POST file not found at: $TEMP_POST"
          fi
          
          exit 0
        env:
          COMMITS_FILE: ${{ runner.temp }}/commits.txt
          DIFFS_PATH: ${{ steps.changed-files.outputs.diffs_path }}
          TEMP_POST: ${{ runner.temp }}/blog-post-temp.json


      - name: Update blogs-data.json
        if: steps.generate-post.outputs.post_json_path != ''
        id: update-blogs
        run: |
          set +e
          
          # Debug: show what we're working with
          echo "═══════════════════════════════════════════════════════"
          echo "🔄 UPDATE BLOGS-DATA.JSON STEP"
          echo "═══════════════════════════════════════════════════════"
          
          POST_JSON_PATH='${{ steps.generate-post.outputs.post_json_path }}'
          echo "post_json_path: $POST_JSON_PATH"
          echo "file exists: $([ -f "$POST_JSON_PATH" ] && echo 'yes' || echo 'no')"
          
          if [ ! -f "$POST_JSON_PATH" ]; then
            echo "❌ ERROR: post_json file not found at $POST_JSON_PATH"
            exit 0
          fi
          
          # Read the blog post JSON from file (avoids bash parsing issues)
          BLOG_POST_JSON=$(cat "$POST_JSON_PATH")
          
          # Use node to process blog post and update JSON
          node << 'NODEJS_EOF'
          const fs = require('fs');
          
          try {
            const blogPostStr = process.env.BLOG_POST_JSON;
            if (!blogPostStr) {
              console.log('No blog post data provided');
              process.exit(0);
            }
            
            let blogPost;
            try {
              blogPost = JSON.parse(blogPostStr);
            } catch (e) {
              console.error('Failed to parse blog post JSON:', e.message);
              console.error('Raw (first 200 chars):', blogPostStr.substring(0, 200));
              process.exit(0);
            }
            
            const date = new Date().toISOString().split('T')[0];
            
            let blogsData = { auto_posts: [] };
            const dataPath = 'blogs-data.json';
            
            if (fs.existsSync(dataPath)) {
              try {
                blogsData = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
              } catch (e) {
                console.log('Creating new blogs-data.json');
              }
            }
            
            const newPost = {
              id: `auto-${date}-${Math.random().toString(36).substr(2, 9)}`,
              title: blogPost.title || 'Azure Local Documentation Update',
              subtitle: blogPost.subtitle || 'New updates to Azure Local documentation',
              date: date,
              content: blogPost.content || '<p class="article-text">Blog content generated from Azure Local documentation changes</p>',
              source: 'Azure Local Docs Monitor',
              auto_generated: true
            };
            
            blogsData.auto_posts.unshift(newPost);
            // Keep only last 12 auto posts
            blogsData.auto_posts = blogsData.auto_posts.slice(0, 12);
            
            fs.writeFileSync(dataPath, JSON.stringify(blogsData, null, 2));
            
            console.log('═══════════════════════════════════════════════════════');
            console.log('✅ BLOGS-DATA.JSON UPDATED');
            console.log('═══════════════════════════════════════════════════════');
            console.log('Post ID:', newPost.id);
            console.log('Title:', newPost.title);
            console.log('Subtitle:', newPost.subtitle);
            console.log('Total auto posts:', blogsData.auto_posts.length);
            console.log('');
            console.log('File contents (first 500 chars):');
            console.log(JSON.stringify(blogsData, null, 2).substring(0, 500));
            
          } catch (error) {
            console.error('Error updating blogs-data.json:', error);
            process.exit(0);
          }
          NODEJS_EOF
          
          exit 0
        env:
          BLOG_POST_JSON: ${{ steps.generate-post.outputs.post_json }}

      - name: Commit and push changes
        if: steps.generate-post.outputs.post_json_path != ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blogs-data.json
          git commit -m "Auto-generated blog post: Azure Local docs update" || echo "No changes to commit"
          git push origin main
