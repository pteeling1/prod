name: Monitor Azure Local Docs & Generate Blog Post

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest commits to Azure Local docs
        id: get-commits
        run: |
          set +e  # Disable exit-on-error for this step
          
          # Use GitHub API to monitor MicrosoftDocs/azure-stack-docs (the correct public repository)
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Querying MicrosoftDocs/azure-stack-docs since: $SINCE_DATE"
          
          # Query commits to the main branch
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=20")
          
          # Extract HTTP status code and body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Body length: $(echo "$BODY" | wc -c) bytes"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "API request failed with status $HTTP_CODE"
            echo "Response: $BODY"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Try to validate JSON first
          if ! echo "$BODY" | jq empty 2>/dev/null; then
            echo "Response is not valid JSON"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for error message in response
          ERROR_MSG=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null)
          if [ ! -z "$ERROR_MSG" ]; then
            echo "API Error: $ERROR_MSG"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if response is a valid array
          IS_ARRAY=$(echo "$BODY" | jq 'type' 2>/dev/null)
          echo "Response type: $IS_ARRAY"
          
          if [ "$IS_ARRAY" != '"array"' ]; then
            echo "API response is not an array (type: $IS_ARRAY)"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Count commits
          COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null)
          echo "Found $COUNT recent commits"
          
          if [ "$COUNT" -eq 0 ] || [ -z "$COUNT" ]; then
            echo "No recent changes found"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Extract commits
            COMMITS=$(echo "$BODY" | jq -r '.[] | "\(.sha[0:7])|\(.commit.message // "")|\(.commit.author.date // "")"' 2>/dev/null | head -5)
            
            if [ ! -z "$COMMITS" ]; then
              echo "Successfully extracted $COUNT commits"
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "commits<<EOF" >> $GITHUB_OUTPUT
              echo "$COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "No commits could be extracted"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          exit 0

      - name: Fetch changed files and content
        if: steps.get-commits.outputs.has_changes == 'true'
        id: changed-files
        run: |
          set +e  # Disable exit-on-error
          
          # Get list of files that changed in the last 7 days
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=20")
          
          # Get all changed files
          FILES=$(echo "$RESPONSE" | jq -r '.[].files[]? | select(.status != "deleted") | .filename' 2>/dev/null | sort -u)
          FILE_COUNT=$(echo "$FILES" | grep -c '^' || echo 0)
          
          echo "Found $FILE_COUNT changed files"
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Fetch content from first 5 files (using temp file to avoid subshell)
          TEMP_CONTENT=$(mktemp)
          echo "--- Fetching file contents ---" >> "$TEMP_CONTENT"
          
          # Read files without pipe to avoid subshell
          while IFS= read -r file; do
            if [ ! -z "$file" ]; then
              echo "Fetching: $file" 
              echo "--- File: $file ---" >> "$TEMP_CONTENT"
              CONTENT=$(curl -s "https://raw.githubusercontent.com/MicrosoftDocs/azure-stack-docs/main/$file" 2>/dev/null)
              if [ ! -z "$CONTENT" ]; then
                echo "$CONTENT" | head -c 2000 >> "$TEMP_CONTENT"
              else
                echo "[Failed to fetch or empty]" >> "$TEMP_CONTENT"
              fi
              echo "" >> "$TEMP_CONTENT"
            fi
          done <<< "$(echo "$FILES" | head -5)"
          
          echo "file_contents<<EOF" >> $GITHUB_OUTPUT
          cat "$TEMP_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          rm -f "$TEMP_CONTENT"
          echo "File content fetch complete"
          exit 0

      - name: Generate blog post with Copilot
        if: steps.get-commits.outputs.has_changes == 'true'
        id: generate-post
        uses: actions/github-script@v7
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}
          COMMITS: ${{ steps.get-commits.outputs.commits }}
          FILE_CONTENTS: ${{ steps.changed-files.outputs.file_contents }}
        with:
          script: |
            const https = require('https');
            
            const prompt = `You are a technical blog writer for Teeling Cloud Courant, a publication about hybrid cloud and Azure Local.
            
            Recent changes to Azure Local documentation:
            
            Commits:
            ${{ env.COMMITS }}
            
            Changed files and preview content:
            ${{ env.FILE_CONTENTS }}
            
            Based on these Azure documentation updates, create a new blog post. Use this as your style guide:
            
            ${require('fs').readFileSync('./blogs-style-guide.md', 'utf8')}
            
            Requirements:
            - Write in the same tone and format as existing Teeling Cloud Courant posts
            - Focus on the architectural and operational implications for Azure Local deployments
            - Include specific details from the updated documentation
            - Provide actionable guidance where relevant
            - Assume the audience is hybrid cloud professionals and Azure Local operators
            - Keep a professional but conversational tone
            
            IMPORTANT: Respond ONLY with valid JSON, no other text. Structure:
            {
              "title": "Blog title here",
              "subtitle": "Subtitle or key takeaway",
              "content": "Full blog content in HTML (wrap paragraphs in <p class=\\"article-text\\"> tags)"
            }`;
            
            // Call GitHub Copilot API via models endpoint
            return new Promise((resolve, reject) => {
              const postData = JSON.stringify({
                model: 'gpt-4',
                messages: [
                  {
                    role: 'system',
                    content: 'You are an expert technical writer specializing in Azure infrastructure and hybrid cloud architecture. You MUST respond with ONLY valid JSON, no markdown or extra text.'
                  },
                  {
                    role: 'user',
                    content: prompt
                  }
                ],
                temperature: 0.7,
                max_tokens: 2000
              });
              
              // Use GitHub Models API endpoint (correct endpoint)
              const options = {
                hostname: 'api.github.com',
                path: '/models/chat/completions',
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${{ env.COPILOT_TOKEN }}`,
                  'Content-Type': 'application/json',
                  'Content-Length': postData.length,
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2024-10-01',
                  'User-Agent': 'GitHub-Workflow'
                }
              };
              
              const req = https.request(options, (res) => {
                let data = '';
                
                res.on('data', (chunk) => { data += chunk; });
                
                res.on('end', () => {
                  console.log(`API Response Status: ${res.statusCode}`);
                  console.log(`Response (first 500 chars): ${data.substring(0, 500)}`);
                  
                  if (res.statusCode !== 200) {
                    reject(new Error(`API returned status ${res.statusCode}: ${data.substring(0, 200)}`));
                    return;
                  }
                  
                  try {
                    // Parse the wrapper response
                    const wrapper = JSON.parse(data);
                    
                    // Extract the actual content
                    let content;
                    if (wrapper.choices && wrapper.choices[0] && wrapper.choices[0].message) {
                      content = wrapper.choices[0].message.content;
                    } else if (typeof wrapper === 'string') {
                      content = wrapper;
                    } else {
                      content = JSON.stringify(wrapper);
                    }
                    
                    console.log(`Extracted content (first 300 chars): ${content.substring(0, 300)}`);
                    
                    // Try to parse as JSON
                    try {
                      const parsed = JSON.parse(content);
                      resolve({ status: 200, data: parsed });
                    } catch (jsonError) {
                      // If it's not JSON, return it as is for further processing
                      console.log('Content is not JSON, attempting to extract JSON...');
                      
                      // Try to extract JSON from markdown code blocks
                      const jsonMatch = content.match(/```(?:json)?\s*({[\s\S]*?})\s*```/);
                      if (jsonMatch) {
                        resolve({ status: 200, data: JSON.parse(jsonMatch[1]) });
                      } else {
                        reject(new Error(`Response is not valid JSON and no JSON block found: ${content.substring(0, 200)}`));
                      }
                    }
                  } catch (parseError) {
                    reject(new Error(`Failed to parse response: ${parseError.message}`));
                  }
                });
              });
              
              req.on('error', (error) => {
                console.error(`Request error: ${error.message}`);
                reject(error);
              });
              
              req.on('timeout', () => {
                req.destroy();
                reject(new Error('Request timeout'));
              });
              
              req.setTimeout(30000);
              req.write(postData);
              req.end();
            });


      - name: Update blogs-data.json
        if: steps.generate-post.outputs.result != ''
        run: |
          set +e
          
          # Extract the actual result data
          RESULT='${{ steps.generate-post.outputs.result }}'
          
          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "No valid result from Copilot API"
            exit 0
          fi
          
          # Use node to process JSON safely
          node << 'NODEJS_EOF'
          const fs = require('fs');
          
          try {
            const resultStr = process.env.COPILOT_RESULT;
            if (!resultStr) {
              console.log('No COPILOT_RESULT provided');
              process.exit(0);
            }
            
            let resultData;
            try {
              resultData = JSON.parse(resultStr);
            } catch (e) {
              console.error('Failed to parse result:', e.message);
              console.error('Raw (first 300 chars):', resultStr.substring(0, 300));
              process.exit(0);
            }
            
            // Handle both direct object and wrapped format
            let post = resultData.data || resultData;
            
            if (!post || !post.title) {
              console.error('Post missing required fields');
              console.log('Post object:', JSON.stringify(post, null, 2));
              process.exit(0);
            }
            
            const date = new Date().toISOString().split('T')[0];
            
            let blogsData = { auto_posts: [] };
            const dataPath = 'blogs-data.json';
            
            if (fs.existsSync(dataPath)) {
              try {
                blogsData = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
              } catch (e) {
                console.log('Creating new blogs-data.json');
              }
            }
            
            const newPost = {
              id: `auto-${date}-${Math.random().toString(36).substr(2, 9)}`,
              title: post.title || 'Azure Local Documentation Update',
              subtitle: post.subtitle || 'New updates to Azure Local documentation',
              date: date,
              content: post.content || '<p class="article-text">Blog content generated</p>',
              source: 'Azure Local Docs Monitor',
              auto_generated: true
            };
            
            blogsData.auto_posts.unshift(newPost);
            // Keep only last 12 auto posts
            blogsData.auto_posts = blogsData.auto_posts.slice(0, 12);
            
            fs.writeFileSync(dataPath, JSON.stringify(blogsData, null, 2));
            console.log('✓ Updated blogs-data.json with new post:', newPost.id);
            
          } catch (error) {
            console.error('Error updating blogs-data.json:', error);
            process.exit(0);
          }
          NODEJS_EOF
          
          exit 0
        env:
          COPILOT_RESULT: ${{ steps.generate-post.outputs.result }}

      - name: Commit and push changes
        if: steps.generate-post.outputs.result != ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blogs-data.json
          git commit -m "Auto-generated blog post: Azure Local docs update" || echo "No changes to commit"
          git push
