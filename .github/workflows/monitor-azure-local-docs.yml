name: Monitor Azure Local Docs & Generate Blog Post

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest commits to Azure Local docs
        id: get-commits
        run: |
          set +e  # Disable exit-on-error for this step
          
          # Use GitHub API to monitor MicrosoftDocs/azure-stack-docs (the correct public repository)
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Querying MicrosoftDocs/azure-stack-docs since: $SINCE_DATE"
          
          # Query commits to the main branch
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=20")
          
          # Extract HTTP status code and body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Body length: $(echo "$BODY" | wc -c) bytes"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "API request failed with status $HTTP_CODE"
            echo "Response: $BODY"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Try to validate JSON first
          if ! echo "$BODY" | jq empty 2>/dev/null; then
            echo "Response is not valid JSON"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for error message in response
          ERROR_MSG=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null)
          if [ ! -z "$ERROR_MSG" ]; then
            echo "API Error: $ERROR_MSG"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if response is a valid array
          IS_ARRAY=$(echo "$BODY" | jq 'type' 2>/dev/null)
          echo "Response type: $IS_ARRAY"
          
          if [ "$IS_ARRAY" != '"array"' ]; then
            echo "API response is not an array (type: $IS_ARRAY)"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Count commits
          COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null)
          echo "Found $COUNT recent commits"
          
          if [ "$COUNT" -eq 0 ] || [ -z "$COUNT" ]; then
            echo "No recent changes found"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Extract commits
            COMMITS=$(echo "$BODY" | jq -r '.[] | "\(.sha[0:7])|\(.commit.message // "")|\(.commit.author.date // "")"' 2>/dev/null | head -5)
            
            if [ ! -z "$COMMITS" ]; then
              echo "Successfully extracted $COUNT commits"
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "commits<<EOF" >> $GITHUB_OUTPUT
              echo "$COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "No commits could be extracted"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          exit 0

      - name: Fetch changed files and content
        if: steps.get-commits.outputs.has_changes == 'true'
        id: changed-files
        run: |
          set +e  # Disable exit-on-error
          
          # Get list of files from the commits we already found
          COMMITS_DATA='${{ steps.get-commits.outputs.commits }}'
          
          # Extract just the first 3 SHAs from commits to get file details
          SHAS=$(echo "$COMMITS_DATA" | cut -d'|' -f1 | head -3)
          
          echo "═══════════════════════════════════════════════════════"
          echo "📁 FETCHING FILE DETAILS FOR COMMITS"
          echo "═══════════════════════════════════════════════════════"
          
          TEMP_CONTENT=$(mktemp)
          echo "--- Fetching file contents ---" >> "$TEMP_CONTENT"
          
          FILE_COUNT=0
          while IFS= read -r sha; do
            if [ ! -z "$sha" ]; then
              echo "Getting files for commit $sha"
              # Get commit details which includes files
              COMMIT_DETAIL=$(curl -s "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits/$sha" \
                -H "Accept: application/vnd.github.v3+json")
              
              # Extract files from this commit
              FILES=$(echo "$COMMIT_DETAIL" | jq -r '.files[]? | select(.status != "deleted") | .filename' 2>/dev/null)
              
              # Fetch content for each file
              while IFS= read -r file; do
                if [ ! -z "$file" ]; then
                  FILE_COUNT=$((FILE_COUNT + 1))
                  echo "  ✓ [$sha] $file"
                  echo "--- File: $file (commit: $sha) ---" >> "$TEMP_CONTENT"
                  
                  CONTENT=$(curl -s "https://raw.githubusercontent.com/MicrosoftDocs/azure-stack-docs/main/$file" 2>/dev/null)
                  if [ ! -z "$CONTENT" ]; then
                    echo "$CONTENT" | head -c 2000 >> "$TEMP_CONTENT"
                  else
                    echo "[Failed to fetch or empty]" >> "$TEMP_CONTENT"
                  fi
                  echo "" >> "$TEMP_CONTENT"
                fi
              done <<< "$FILES"
            fi
          done <<< "$SHAS"
          
          echo "Found $FILE_COUNT files in commits"
          echo ""
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Save temp content to workspace (not /tmp which gets deleted between steps)
          # Use the runner temp directory which persists for the job
          CONTENT_FILE="${RUNNER_TEMP}/file-contents.txt"
          cp "$TEMP_CONTENT" "$CONTENT_FILE"
          echo "file_contents_path=$CONTENT_FILE" >> $GITHUB_OUTPUT
          rm -f "$TEMP_CONTENT"
          
          echo "File content fetch complete"
          exit 0

      - name: Generate blog post from commits
        if: steps.get-commits.outputs.has_changes == 'true'
        id: generate-post
        run: |
          set +e
          
          # Write commits and file contents to files to avoid bash parsing issues
          COMMITS_FILE="${RUNNER_TEMP}/commits.txt"
          FILE_CONTENTS_PATH='${{ steps.changed-files.outputs.file_contents_path }}'
          
          echo '${{ steps.get-commits.outputs.commits }}' > "$COMMITS_FILE"
          
          # Debug output
          echo "DEBUG: Commits file: $COMMITS_FILE"
          echo "DEBUG: Commits file exists: $([ -f "$COMMITS_FILE" ] && echo 'yes' || echo 'no')"
          echo "DEBUG: Commits lines: $(wc -l < "$COMMITS_FILE")"
          echo "DEBUG: File contents path: $FILE_CONTENTS_PATH"
          echo "DEBUG: File exists: $([ -f "$FILE_CONTENTS_PATH" ] && echo 'yes' || echo 'no')"
          
          # Use Node.js to generate blog post from commit data
          # Save to temp file so next step can read it
          TEMP_POST="${RUNNER_TEMP}/blog-post-temp.json"
          
          node << 'NODEJS_EOF'
          const fs = require('fs');
          
          try {
            // Read commits from file
            const commitsFile = process.env.COMMITS_FILE;
            const fileContentsFile = process.env.FILE_CONTENTS_PATH;
            
            let commits = '';
            let fileContents = '';
            
            if (fs.existsSync(commitsFile)) {
              commits = fs.readFileSync(commitsFile, 'utf8');
              console.log(`Read commits from file: ${commits.length} chars`);
            } else {
              console.log(`⚠️ Commits file not found: ${commitsFile}`);
            }
            
            if (fs.existsSync(fileContentsFile)) {
              fileContents = fs.readFileSync(fileContentsFile, 'utf8');
              console.log(`Read file contents from file: ${fileContents.length} chars`);
            } else {
              console.log(`⚠️ File contents file not found: ${fileContentsFile}`);
            }
            
            // Parse commits
            const commitLines = commits.split('\n').filter(line => line.trim());
            const commitMessages = commitLines.map(line => {
              const parts = line.split('|');
              return {
                sha: (parts[0] || '').trim(),
                message: (parts[1] || '').trim(),
                date: (parts[2] || '').trim()
              };
            }).filter(c => c.message);
            
            if (commitMessages.length === 0) {
              console.log('No commits to process');
              process.exit(0);
            }
            
            console.log('═══════════════════════════════════════════════════════');
            console.log('📝 COMMITS BEING PROCESSED');
            console.log('═══════════════════════════════════════════════════════');
            console.log(`Total commits: ${commitMessages.length}`);
            commitMessages.slice(0, 10).forEach((c, i) => {
              console.log(`  ${i+1}. [${c.sha}] ${c.message.substring(0, 70)}`);
            });
            if (commitMessages.length > 10) {
              console.log(`  ... and ${commitMessages.length - 10} more`);
            }
            console.log('');
            
            console.log('═══════════════════════════════════════════════════════');
            console.log('🔍 FILE CONTENTS BEING ANALYZED');
            console.log('═══════════════════════════════════════════════════════');
            const filePreview = fileContents.substring(0, 300);
            console.log(`Content preview (first 300 chars):\n${filePreview}...\n`);
            
            // Extract key topics from commit messages
            const topics = new Set();
            commitMessages.forEach(c => {
              const msg = c.message.toLowerCase();
              if (msg.includes('support') || msg.includes('deadline')) topics.add('support deadline');
              if (msg.includes('cluster') || msg.includes('sizing')) topics.add('cluster configuration');
              if (msg.includes('update') || msg.includes('change')) topics.add('documentation update');
              if (msg.includes('feature') || msg.includes('new')) topics.add('new capability');
              if (msg.includes('fix') || msg.includes('bug')) topics.add('bug fix');
              if (msg.includes('performance') || msg.includes('optimize')) topics.add('performance');
            });
            
            console.log('📊 EXTRACTED TOPICS:');
            Array.from(topics).forEach(t => console.log(`  • ${t}`));
            console.log('');
            
            // Generate blog post
            const date = new Date().toISOString().split('T')[0];
            const topicsList = Array.from(topics).join(', ');
            
            const blogPost = {
              title: 'Azure Local Documentation Update — ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' }),
              subtitle: topicsList || 'Recent Azure Local documentation changes and updates',
              content: `
              <p class="article-text">The Azure Local documentation has been recently updated with ${commitMessages.length} new changes. These updates reflect ongoing improvements to Azure Local deployments and best practices.</p>
              
              <p class="article-text"><strong>What's Changed:</strong></p>
              <ul class="article-list">
              ${commitMessages.slice(0, 5).map(c => `<li>${c.message}</li>`).join('\n')}
              </ul>
              
              <p class="article-text"><strong>Key Areas:</strong></p>
              <ul class="article-list">
              ${Array.from(topics).slice(0, 5).map(t => `<li>${t}</li>`).join('\n')}
              </ul>
              
              <p class="article-text">For detailed information about these updates, refer to the official <a href="https://learn.microsoft.com/en-us/azure/azure-local/" target="_blank">Azure Local documentation</a>.</p>
              `.trim()
            };
            
            // Write JSON to temp file so next step can read it
            const jsonOutput = JSON.stringify(blogPost);
            const tempPostFile = process.env.TEMP_POST || '/tmp/blog-post-temp.json';
            fs.writeFileSync(tempPostFile, jsonOutput);
            console.log(`Wrote blog post to: ${tempPostFile}`);
            
            // Also log it for visibility
            console.log('═══════════════════════════════════════════════════════');
            console.log('✅ BLOG POST GENERATED');
            console.log('═══════════════════════════════════════════════════════');
            console.log(jsonOutput);
            console.log('');
            
          } catch (error) {
            console.error('Error generating blog post:', error);
            process.exit(1);
          }
          NODEJS_EOF
          
          # Output the post for next step via environment
          if [ -f "$TEMP_POST" ]; then
            POST_JSON=$(cat "$TEMP_POST")
            echo "✅ Successfully read post from $TEMP_POST"
            echo "post_json<<EOF" >> $GITHUB_OUTPUT
            echo "$POST_JSON" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "📤 Set post_json output ($(echo "$POST_JSON" | wc -c) bytes)"
            rm -f "$TEMP_POST"
          else
            echo "❌ TEMP_POST file not found at: $TEMP_POST"
          fi
          
          exit 0
        env:
          COMMITS_FILE: ${{ runner.temp }}/commits.txt
          FILE_CONTENTS_PATH: ${{ steps.changed-files.outputs.file_contents_path }}
          TEMP_POST: ${{ runner.temp }}/blog-post-temp.json


      - name: Update blogs-data.json
        if: steps.generate-post.outputs.post_json != ''
        id: update-blogs
        run: |
          set +e
          
          # Debug: show what we're working with
          echo "═══════════════════════════════════════════════════════"
          echo "🔄 UPDATE BLOGS-DATA.JSON STEP"
          echo "═══════════════════════════════════════════════════════"
          echo "post_json output exists: ${{ steps.generate-post.outputs.post_json != '' }}"
          BLOG_POST_LEN=$(echo '${{ steps.generate-post.outputs.post_json }}' | wc -c)
          echo "post_json length: $BLOG_POST_LEN bytes"
          if [ "$BLOG_POST_LEN" -lt 10 ]; then
            echo "❌ ERROR: post_json is too short!"
            exit 0
          fi
          
          # Use node to process blog post and update JSON
          node << 'NODEJS_EOF'
          const fs = require('fs');
          
          try {
            const blogPostStr = process.env.BLOG_POST_JSON;
            if (!blogPostStr) {
              console.log('No blog post data provided');
              process.exit(0);
            }
            
            let blogPost;
            try {
              blogPost = JSON.parse(blogPostStr);
            } catch (e) {
              console.error('Failed to parse blog post JSON:', e.message);
              console.error('Raw (first 200 chars):', blogPostStr.substring(0, 200));
              process.exit(0);
            }
            
            const date = new Date().toISOString().split('T')[0];
            
            let blogsData = { auto_posts: [] };
            const dataPath = 'blogs-data.json';
            
            if (fs.existsSync(dataPath)) {
              try {
                blogsData = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
              } catch (e) {
                console.log('Creating new blogs-data.json');
              }
            }
            
            const newPost = {
              id: `auto-${date}-${Math.random().toString(36).substr(2, 9)}`,
              title: blogPost.title || 'Azure Local Documentation Update',
              subtitle: blogPost.subtitle || 'New updates to Azure Local documentation',
              date: date,
              content: blogPost.content || '<p class="article-text">Blog content generated from Azure Local documentation changes</p>',
              source: 'Azure Local Docs Monitor',
              auto_generated: true
            };
            
            blogsData.auto_posts.unshift(newPost);
            // Keep only last 12 auto posts
            blogsData.auto_posts = blogsData.auto_posts.slice(0, 12);
            
            fs.writeFileSync(dataPath, JSON.stringify(blogsData, null, 2));
            
            console.log('═══════════════════════════════════════════════════════');
            console.log('✅ BLOGS-DATA.JSON UPDATED');
            console.log('═══════════════════════════════════════════════════════');
            console.log('Post ID:', newPost.id);
            console.log('Title:', newPost.title);
            console.log('Subtitle:', newPost.subtitle);
            console.log('Total auto posts:', blogsData.auto_posts.length);
            console.log('');
            console.log('File contents (first 500 chars):');
            console.log(JSON.stringify(blogsData, null, 2).substring(0, 500));
            
          } catch (error) {
            console.error('Error updating blogs-data.json:', error);
            process.exit(0);
          }
          NODEJS_EOF
          
          exit 0
        env:
          BLOG_POST_JSON: ${{ steps.generate-post.outputs.post_json }}

      - name: Commit and push changes
        if: steps.generate-post.outputs.post_json != ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blogs-data.json
          git commit -m "Auto-generated blog post: Azure Local docs update" || echo "No changes to commit"
          git push origin main
