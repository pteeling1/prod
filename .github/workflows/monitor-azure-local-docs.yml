name: Generate Blog from Azure Docs Changes

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/monitor-azure-local-docs.yml'
      - 'scripts/generate-blog.js'
  workflow_dispatch: {}
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Generate blog posts
        run: node scripts/generate-blog.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
