name: Generate Blog from Azure Docs Changes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Azure Local doc changes
        id: fetch-commits
        run: |
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=100")
          
          # Filter for Azure Local documentation changes
          FILTERED=$(echo "$RESPONSE" | jq -c '[.[] | select(.commit.message | contains("azure-local") or contains("Azure Local") or contains("azure/local"))]')
          
          # If no direct mentions, get first matching deployment/config commit
          if [ "$(echo "$FILTERED" | jq 'length')" == "0" ]; then
            FILTERED=$(echo "$RESPONSE" | jq '[.[] | select(.commit.message | test("(deploy|upgrade|update|security|config)", "i"))] | .[0:1]' -c)
          fi
          
          echo "commits=$(echo "$FILTERED" | jq -c '.' )" >> $GITHUB_OUTPUT
      
      - name: Generate blog with Claude
        id: generate-blog
        run: |
          cat > /tmp/gen-blog.js << 'EOF'
          const https = require('https');
          
          async function callClaudeAPI(prompt) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({
                model: "claude-3.5-sonnet",
                messages: [{ role: "user", content: prompt }],
                max_tokens: 1024
              });
              
              const options = {
                hostname: 'api.github.com',
                path: '/models/chat/completions',
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
                  'Content-Type': 'application/json',
                  'Content-Length': data.length
                },
                timeout: 30000
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    reject(new Error('API: ' + res.statusCode));
                  } else {
                    try {
                      const p = JSON.parse(body);
                      resolve(p.choices[0].message.content);
                    } catch (e) {
                      reject(e);
                    }
                  }
                });
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }
          
          async function run() {
            const commits = JSON.parse(process.env.COMMITS_DATA || '[]');
            if (!commits || !commits.length) {
              console.log(JSON.stringify({
                id: 'auto-' + new Date().toISOString().slice(0,10) + '-none',
                title: 'Azure Local Docs Monitor', subtitle: 'No recent changes',
                date: new Date().toISOString().slice(0,10),
                content: '<p class="article-text">No Azure Local documentation updates found in the past week.</p>',
                source: 'Azure Local Docs Monitor', auto_generated: true
              }));
              return;
            }
            
            const c = commits[0];
            const msg = (c.commit.message || '').split('\n')[0];
            const title = 'Azure Local Update — ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
            
            try {
              const p = 'Write 80-120 word technical blog for ops teams about: ' + msg + '\nBe specific, actionable, and mention impact.';
              const claude = await callClaudeAPI(p);
              const content = claude.split('\n').filter(l => l.trim()).map(l => '<p class="article-text">' + l + '</p>').join('');
              console.log(JSON.stringify({
                id: 'auto-' + new Date().toISOString().slice(0,10) + '-' + Math.random().toString(36).slice(2,11),
                title: title, subtitle: 'Azure Local docs update', date: new Date().toISOString().slice(0,10),
                content: content + '<p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/' + c.sha.slice(0,7) + '">View →</a></p>',
                source: 'Azure Local Docs Monitor', auto_generated: true, claude_generated: true
              }));
            } catch (e) {
              const content = '<p class="article-text"><strong>' + msg + '</strong></p><p class="article-text">Documentation updated. Review changes for latest requirements.</p>';
              console.log(JSON.stringify({
                id: 'auto-' + new Date().toISOString().slice(0,10) + '-' + Math.random().toString(36).slice(2,11),
                title: title, subtitle: 'Azure Local docs update', date: new Date().toISOString().slice(0,10),
                content: content + '<p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/' + c.sha.slice(0,7) + '">View →</a></p>',
                source: 'Azure Local Docs Monitor', auto_generated: true
              }));
            }
          }
          
          run().catch(e => {
            console.log(JSON.stringify({
              id: 'auto-fallback', title: 'Update', subtitle: 'docs',
              date: new Date().toISOString().slice(0,10),
              content: '<p>Update available</p>', source: 'Monitor', auto_generated: true
            }));
            process.exit(1);
          });
          EOF
          
          node /tmp/gen-blog.js > /tmp/blog.json 2>&1
          
          # Log the output for debugging
          echo "Blog JSON output:"
          cat /tmp/blog.json
          
          if [ -f /tmp/blog.json ] && [ -s /tmp/blog.json ]; then
            echo "blog_post<<EOFBLOG" >> $GITHUB_OUTPUT
            cat /tmp/blog.json >> $GITHUB_OUTPUT
            echo "EOFBLOG" >> $GITHUB_OUTPUT
          fi
        env:
          COMMITS_DATA: ${{ steps.fetch-commits.outputs.commits }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update blogs-data.json
        run: |
          BLOG_JSON='${{ steps.generate-blog.outputs.blog_post }}'
          
          # Check if blog post is valid JSON
          if ! echo "$BLOG_JSON" | jq empty 2>/dev/null; then
            echo "Invalid blog JSON, skipping"
            exit 0
          fi
          
          # Update blogs-data.json
          jq ".auto_posts |= [$(echo "$BLOG_JSON")] + ." blogs-data.json > blogs-data.json.tmp
          mv blogs-data.json.tmp blogs-data.json
          
          # Commit if changed
          if git diff --quiet blogs-data.json; then
            echo "No changes to blog data"
          else
            git config user.email "bot@example.com"
            git config user.name "Blog Bot"
            git add blogs-data.json
            git commit -m "Auto-generated blog post"
            git push origin main
          fi
