<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RVTools Import & Sizing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<div class="container-fluid py-4">
  <div class="row mb-4 align-items-center">
    <!-- Left column: title + description -->
    <div class="col">
      <h2 class="fw-bold text-primary">
        <i class="bi bi-hdd-network me-2"></i>RVTools Import & Sizing
      </h2>
      <p class="text-muted">
        Upload your RVTools export, preview clusters, and generate sizing recommendations.
      </p>
    </div>

    <!-- Right column: back button -->
    <div class="col-auto text-end">
      <a href="index.html" class="btn btn-outline-secondary">
        ← Back to Home
      </a>
    </div>
  </div>
</div>

  <!-- Mode Selection Tabs -->
  <div class="row mb-3">
    <div class="col">
      <ul class="nav nav-tabs" id="rvtoolsModes" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="rvtools-mode-tab" data-bs-toggle="tab" data-bs-target="#rvtools-mode" type="button" role="tab" aria-controls="rvtools-mode" aria-selected="true">
            <i class="bi bi-upload me-1"></i>RVTools Import
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="batch-mode-tab" data-bs-toggle="tab" data-bs-target="#batch-mode" type="button" role="tab" aria-controls="batch-mode" aria-selected="false">
            <i class="bi bi-file-spreadsheet me-1"></i>Batch Sizing
          </button>
        </li>
      </ul>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="tab-content" id="rvtoolsModesContent">
    <!-- RVTools Mode -->
    <div class="tab-pane fade show active" id="rvtools-mode" role="tabpanel" aria-labelledby="rvtools-mode-tab">

    <div class="row g-3 align-items-center">
      <div class="col-md-6">
        <input type="file" id="rvtoolsUpload" class="form-control" multiple>
      </div>
      <div class="col-md-6">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="excludePoweredOff">
          <label class="form-check-label" for="excludePoweredOff">Exclude powered-off VMs</label>
        </div>
      </div>
    </div>
    <div id="loadingIndicator" class="mt-2 text-muted" style="display:none;">
      <i class="bi bi-hourglass-split"></i> Processing files...
    </div>
  </div>

  <!-- Cluster Selection + Actions -->
  <div class="card p-3 mb-4">
    <h5><i class="bi bi-diagram-3 me-2"></i>Cluster Selection & Actions</h5>

    <!-- Cluster checkboxes -->
    <div id="clusterFilterContainer" class="cluster-checkboxes mb-3"></div>

    <!-- Controls row -->
    <div class="row g-2 align-items-center">
      <div class="col-auto">
        <button class="btn btn-outline-primary" id="addGroupBtn">
          <i class="bi bi-collection me-1"></i>Add Group
        </button>
      </div>
    <div class="col-auto">
  <div class="d-flex align-items-center">
    <select id="groupingMode" class="form-select">
      <option value="perCluster" selected>Per Cluster</option>
      <option value="grouped">Grouped</option>
    </select>
    <i class="bi bi-info-circle ms-2 text-muted"
       data-bs-toggle="tooltip"
       title="Per Cluster: runs sizing separately for each cluster. Grouped: combines selected clusters into one sizing run.">
    </i>
  </div>
</div>
      <div class="col-auto">
        <button class="btn btn-primary" id="runSizingBtn">
          <i class="bi bi-play-circle me-1"></i>Run Sizing
        </button>
      </div>
      <div class="col-auto">
        <button class="btn btn-success" id="exportSummaryBtn">
          <i class="bi bi-file-earmark-excel me-1"></i>Export
        </button>
      </div>
    
<div class="col-auto">
  <button class="btn btn-outline-secondary" id="advancedBtn" type="button"
          data-bs-toggle="collapse" data-bs-target="#advancedOptions"
          aria-expanded="false" aria-controls="advancedOptions">
    <i class="bi bi-gear me-1"></i>Advanced
  </button>
</div>
<div class="collapse mt-3" id="advancedOptions">
  <div class="card card-body">
    <h6 class="fw-bold"><i class="bi bi-funnel me-1"></i>Advanced Filters</h6>
    <div id="osFilterContainer"></div>
  <div class="mt-3" id="cpuSelectorContainer">
  <label for="cpuModelSelect" class="form-label">Force CPU Model Across All Sites</label>
  <select id="cpuOverrideSelect" class="form-select">
    <option value="">(No override)</option>
    <!-- Options will be injected dynamically -->
  </select>
</div>
<div class="mt-3" id="cpuExclusionContainer">
  <label class="form-label">Exclude CPU Models (non-candidates)</label>
  <div id="cpuExclusionCheckboxes" style="max-height: 200px; overflow-y: auto;"></div>
</div>
</div>
</div>
    <!-- Dynamic group inputs -->
    <div id="groupInputs" class="mt-3"></div>
  </div>
  </div>

  <!-- Sizing Options -->
  <div class="card p-3 mb-4">
    <h5><i class="bi bi-sliders me-2"></i>Sizing Options</h5>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">CPU Generation</label>
        <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="cpuGeneration" id="cpu16g" value="16g" checked>
          <label class="btn btn-outline-primary" for="cpu16g">16G</label>
          
          <input type="radio" class="btn-check" name="cpuGeneration" id="cpu17g" value="17g">
          <label class="btn btn-outline-primary" for="cpu17g">17G</label>
        </div>
      </div>
      <div class="col-md-6">
        <label for="growthFactor" class="form-label">Growth Factor (%)</label>
        <input type="number" id="growthFactor" class="form-control" value="0" min="0" step="1">
      </div>
    </div>
    <div class="row g-3 mt-2">
      <div class="col-md-12">
        <label for="haLevel" class="form-label">Resiliency Level</label>
        <select id="haLevel" class="form-select">
          <option value="n">N</option>
          <option value="n+1" selected>N+1</option>
          <option value="n+2">N+2</option>
        </select>
      </div>
    </div>
    <div class="row g-3 mt-2">
      <div class="col-md-12">
        <label class="form-label">Storage Calculation Method</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="storageMethod" id="storageProvisioned" value="provisioned" checked>
          <label class="form-check-label" for="storageProvisioned">
            Size for provisioned storage (In Use MiB from vInfo)
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="storageMethod" id="storageConsumed" value="consumed">
          <label class="form-check-label" for="storageConsumed">
            Size for guest OS consumed storage (ConsumedMiB from vPartition)
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="storageMethod" id="storageExternal" value="external">
          <label class="form-check-label" for="storageExternal">
            External storage only (2 × 960 GB NVMe, no sizing)
          </label>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-2">
      <div class="col-md-12">
        <label class="form-label">CPU Calculation Method</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="cpuMethod" id="cpuProvisioned" value="provisioned" checked>
          <label class="form-check-label" for="cpuProvisioned">
            Size for provisioned vCPU (use all provisioned vCPU count)
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="cpuMethod" id="cpuUtilization" value="utilization">
          <label class="form-check-label" for="cpuUtilization">
            Size for actual CPU demand (adjust by host CPU utilization %)
          </label>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-2">
      <div class="col-md-12">
        <label class="form-label">Memory Calculation Method</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="memoryMethod" id="memoryProvisioned" value="provisioned" checked>
          <label class="form-check-label" for="memoryProvisioned">
            Size for provisioned memory (use all provisioned memory)
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="memoryMethod" id="memoryConsumed" value="consumed">
          <label class="form-check-label" for="memoryConsumed">
            Size for active memory (use actual consumed/active memory from vMemory)
          </label>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-2">
      <div class="col-md-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="combineSourceFiles" checked>
          <label class="form-check-label" for="combineSourceFiles">
            Combine clusters from different source files into single sizing per group
          </label>
        </div>
      </div>
    </div>
  </div>

 <!-- Preview + Sizing Results side by side -->
<div class="row">
  <div class="col-lg-6">
    <div class="card p-3 mb-4" id="preview-section">
      <h5><i class="bi bi-eye me-2"></i>Preview Parsed Data</h5>
      <div id="file-tabs" class="mb-3"></div>
      <div id="preview-summary" class="preview-summary mb-3"></div>
      <div id="preview-table"></div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card p-3 mb-4">
      <h5><i class="bi bi-bar-chart-line me-2"></i>Sizing Results</h5>
      <div id="sizing-results"></div>
    </div>
  </div>
</div>

    </div><!-- End RVTools Mode Tab Pane -->

    <!-- Batch Sizing Mode -->
    <div class="tab-pane fade" id="batch-mode" role="tabpanel" aria-labelledby="batch-mode-tab">
      <div id="batchSizingContainer" class="mt-3"></div>
    </div><!-- End Batch Mode Tab Pane-->
  </div><!-- End Tab Content -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    tooltipTriggerList.forEach(function (tooltipTriggerEl) {
      new bootstrap.Tooltip(tooltipTriggerEl)
    })
  });
</script>


<!-- Your JS (as module so imports work) -->
<script type="module">
  import { createBatchSizingUI } from './js/batch-sizing.js';
  import { sizeCluster } from './js/sizingEngine.js';
  
  // Initialize batch sizing UI when batch tab is shown
  document.getElementById('batch-mode-tab').addEventListener('shown.bs.tab', () => {
    const container = document.getElementById('batchSizingContainer');
    if (container.innerHTML.trim() === '') {
      createBatchSizingUI('#batchSizingContainer');
    }
  });
</script>
<script type="module" src="js/rvtools-import.js"></script>

</body>
</html>
